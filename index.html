<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG IN</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile Screen Outer Container */
        .mobile-container {
            width: 100%;
            max-width: 414px; /* Standard Mobile Screen Width */
            height: 100vh;
            max-height: 896px; /* Standard Mobile Screen Height */
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 24px 20px 24px;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        }

        /* Header Title */
        .header-title {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #2b2b2b;
            margin-top: 10px;
            margin-bottom: 40px;
        }

        /* Form Styling */
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Input Field Wrapper */
        .input-group {
            display: flex;
            align-items: center;
            background-color: #f8f8f8;
            border-radius: 12px;
            padding: 16px 20px;
        }

        /* Icons Styling */
        .input-group i {
            font-size: 20px;
            color: #9e9e9e;
            margin-right: 16px;
            width: 24px;
            text-align: center;
        }

        /* Input Tag */
        .input-group input {
            border: none;
            outline: none;
            background: transparent;
            width: 100%;
            font-size: 15px;
            color: #333333;
        }

        .input-group input::placeholder {
            color: #b0b0b0;
            font-size: 15px;
            font-weight: 400;
        }

        /* Center spacer to push button down */
        .spacer {
            flex-grow: 1;
        }

        /* Submit Button */
        .login-btn {
            width: 100%;
            background-color: #828282; /* Same Gray color from image */
            color: #ffffff;
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-bottom: 30px;
        }

        .login-btn:active {
            background-color: #6d6d6d;
        }

        /* Bottom Home Bar Indicator for Mobile APK */
        .home-bar {
            width: 134px;
            height: 5px;
            background-color: #000000;
            border-radius: 10px;
            margin: 0 auto;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="mobile-container">
        
        <!-- Top Header -->
        <div class="header-title">LOG IN</div>

        <!-- Input Fields Form -->
        <form id="loginForm" class="form-container">
            
            <!-- Phone Input -->
            <div class="input-group">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" id="phone" placeholder="Enter Your Phone Number" required>
            </div>

            <!-- Password Input -->
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="Enter Password" required>
            </div>

        </form>

        <div class="spacer"></div>

        <!-- Bottom Action Area -->
        <div class="bottom-area">
            <button type="submit" form="loginForm" class="login-btn">LOG IN</button>
            <div class="home-bar"></div>
        </div>

    </div>

    <!-- JavaScript to Handle Redirection to dashboard.html -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Form reload hone se rokega
            
            // Yahan se directly dashboard.html par redirect hoga
            window.location.href = 'dashboard.html';
        });
    </script>

</body>
</html>
